<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopfrechnen – Rechnen gegen die Zeit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      text-align: center;
      width: 360px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      color: #e94560;
    }

    h1 span { color: #eee; }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    /* ── Start screen ── */
    #start-screen button {
      margin-top: 1rem;
    }

    /* ── Game screen ── */
    #game-screen { display: none; }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .score-box, .timer-box, .level-box {
      background: #16213e;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      min-width: 100px;
    }

    .level-box .value { color: #f9ca24; font-size: 1rem; font-weight: 700; padding-top: 0.25rem; }

    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .score-box .value { color: #0f3460; color: #e94560; }

    .timer-box .value { color: #53d8fb; }
    .timer-box.urgent .value { color: #ff6b6b; animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

    /* progress bar */
    .timer-bar-wrap {
      height: 6px;
      background: #16213e;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    #timer-bar {
      height: 100%;
      background: #53d8fb;
      width: 100%;
      transition: width 0.1s linear, background-color 0.3s;
      border-radius: 3px;
    }

    #timer-bar.urgent { background: #ff6b6b; }

    /* problem */
    .problem {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
      min-height: 4.5rem;
    }

    /* answer input */
    #answer {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1.6rem;
      text-align: center;
      border: 2px solid #0f3460;
      border-radius: 12px;
      background: #16213e;
      color: #eee;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #answer:focus { border-color: #53d8fb; }
    #answer.correct { border-color: #4ecca3; background: #1a3a30; }
    #answer.wrong   { border-color: #e94560; background: #3a1a1e; animation: shake 0.3s; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      50%  { transform: translateX(6px); }
      75%  { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    /* feedback */
    #feedback {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      min-height: 1.2rem;
      color: #4ecca3;
    }

    #feedback.wrong { color: #e94560; }

    /* ── Game over screen ── */
    #gameover-screen { display: none; }

    .gameover-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.5rem;
    }

    .final-score {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .final-score span {
      color: #eee;
      font-size: 3rem;
      font-weight: 700;
      display: block;
      margin: 0.3rem 0;
    }

    /* shared button */
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #c73652; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div id="app">

  <!-- Start screen -->
  <div id="start-screen">
    <h1>Kopf<span>rechnen</span></h1>
    <p class="subtitle">Kopfrechnen — schlag die Uhr!</p>
    <p>Löse so viele Aufgaben wie möglich.<br>
       Die Aufgaben beginnen einfach und werden schwieriger.<br>
       Du hast <strong>7 Sekunden</strong> pro Aufgabe.<br>
       Jede richtige Antwort gibt <strong>1 Punkt</strong>.</p>
    <button id="start-btn">Spiel starten</button>
  </div>

  <!-- Game screen -->
  <div id="game-screen">
    <div class="hud">
      <div class="score-box">
         <div class="label">Punkte</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="level-box">
        <div class="label">Level</div>
        <div class="value" id="level-display">Einfach</div>
      </div>
      <div class="timer-box" id="timer-box">
         <div class="label">Zeit</div>
        <div class="value" id="timer">7</div>
      </div>
    </div>

    <div class="timer-bar-wrap">
      <div id="timer-bar"></div>
    </div>

    <div class="problem" id="problem"></div>

    <input
      id="answer"
      type="number"
      inputmode="numeric"
      autocomplete="off"
      placeholder="?"
    />

    <div id="feedback"></div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen">
    <div class="gameover-title">Zeit abgelaufen!</div>
    <div class="final-score">
      Dein Ergebnis
      <span id="final-score">0</span>
    </div>
    <button id="restart-btn">Nochmal spielen</button>
  </div>

</div>

<script>
  const INITIAL_TIME = 7;

  // ── Difficulty levels ───────────────────────────────────────────
  // Each level defines which operations are available, the max operand for
  // addition/subtraction, the max factor for multiplication, and the max
  // divisor/quotient for division.
  const LEVELS = [
    { threshold:  0, name: 'Einfach', ops: ['+'],                   addMax: 10, mulMax: 0,  divMax: 0  },
    { threshold:  4, name: 'Leicht',  ops: ['+', '−'],              addMax: 20, mulMax: 0,  divMax: 0  },
    { threshold:  9, name: 'Mittel',  ops: ['+', '−', '×'],         addMax: 50, mulMax: 6,  divMax: 0  },
    { threshold: 18, name: 'Schwer',  ops: ['+', '−', '×', '÷'],   addMax: 99, mulMax: 9,  divMax: 5  },
    { threshold: 30, name: 'Experte', ops: ['+', '−', '×', '÷'],   addMax: 150, mulMax: 12, divMax: 9 },
  ];

  function getDifficultyLevel(s) {
    let lvl = LEVELS[0];
    for (const l of LEVELS) {
      if (s >= l.threshold) lvl = l;
      else break;
    }
    return lvl;
  }

  const startScreen    = document.getElementById('start-screen');
  const gameScreen     = document.getElementById('game-screen');
  const gameoverScreen = document.getElementById('gameover-screen');

  const scoreEl       = document.getElementById('score');
  const timerEl       = document.getElementById('timer');
  const timerBox      = document.getElementById('timer-box');
  const timerBar      = document.getElementById('timer-bar');
  const problemEl     = document.getElementById('problem');
  const answerEl      = document.getElementById('answer');
  const feedbackEl    = document.getElementById('feedback');
  const finalScore    = document.getElementById('final-score');
  const levelDisplay  = document.getElementById('level-display');

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);
  answerEl.addEventListener('input', onAnswerInput);

  let score = 0;
  let currentAnswer = null;
  let timerInterval = null;
  let timeLeft = INITIAL_TIME;
  let startTime = null;   // timestamp when current question started
  let currentLevelName = LEVELS[0].name;

  // ── Problem generation ──────────────────────────────────────────
  function generateProblem() {
    const lvl = getDifficultyLevel(score);
    const op  = lvl.ops[Math.floor(Math.random() * lvl.ops.length)];
    let a, b, answer;

    if (op === '+') {
      a = rand(3, lvl.addMax);
      b = rand(3, lvl.addMax);
      answer = a + b;

    } else if (op === '−') {
      a = rand(3, lvl.addMax);
      b = rand(3, a);     // ensure positive result (avoids trivial n − 0)
      answer = a - b;

    } else if (op === '×') {
      a = rand(2, lvl.mulMax);
      b = rand(2, lvl.mulMax);
      answer = a * b;

    } else {              // ÷
      b = rand(2, lvl.divMax);       // divisor ≥ 2
      answer = rand(1, lvl.mulMax);  // quotient scales with multiplication range
      a = b * answer;                // dividend — guaranteed integer result
    }

    return { text: `${a} ${op} ${b}`, answer };
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ── Timer ───────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = INITIAL_TIME;
    startTime = performance.now();
    renderTimer(INITIAL_TIME);

    timerInterval = setInterval(() => {
      const elapsed = (performance.now() - startTime) / 1000;
      timeLeft = Math.max(0, INITIAL_TIME - elapsed);
      renderTimer(timeLeft);

      if (timeLeft === 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 100);
  }

  function renderTimer(t) {
    const secs = Math.ceil(t);
    timerEl.textContent = secs;
    const pct = (t / INITIAL_TIME) * 100;
    timerBar.style.width = pct + '%';

    const urgent = t <= 3;
    timerBox.classList.toggle('urgent', urgent);
    timerBar.classList.toggle('urgent', urgent);
  }

  // ── Game flow ───────────────────────────────────────────────────
  function startGame() {
    score = 0;
    currentLevelName = LEVELS[0].name;
    scoreEl.textContent = '0';
    levelDisplay.textContent = currentLevelName;
    feedbackEl.textContent = '';
    feedbackEl.className = '';

    startScreen.style.display    = 'none';
    gameoverScreen.style.display = 'none';
    gameScreen.style.display     = 'block';

    nextQuestion();
  }

  function nextQuestion() {
    const problem = generateProblem();
    currentAnswer = problem.answer;
    problemEl.textContent = problem.text + ' =';

    answerEl.value = '';
    answerEl.className = '';
    answerEl.focus();

    feedbackEl.textContent = '';
    feedbackEl.className = '';

    startTimer();
  }

  function onAnswerInput() {
    const raw = answerEl.value.trim();
    if (raw === '' || raw === '-') return;

    const entered = parseInt(raw, 10);
    if (isNaN(entered)) return;

    if (entered === currentAnswer) {
      clearInterval(timerInterval);
      score += 1;
      scoreEl.textContent = score;

      // Check for level-up
      const newLevelName = getDifficultyLevel(score).name;
      const leveledUp = newLevelName !== currentLevelName;
      currentLevelName = newLevelName;
      levelDisplay.textContent = currentLevelName;

      answerEl.className = 'correct';
      if (leveledUp) {
        feedbackEl.textContent = `⭐ Level: ${currentLevelName}!`;
        feedbackEl.className = '';
      } else {
        feedbackEl.textContent = '✓ Richtig!';
        feedbackEl.className = '';
      }

      setTimeout(nextQuestion, leveledUp ? 700 : 400);
    } else {
      // Only shake when a full plausible answer has been typed.
      // We check by seeing if the answer could still be correct if more
      // digits are typed (simple heuristic: typed string is a prefix of
      // the correct answer string).
      const correctStr = String(currentAnswer);
      if (!correctStr.startsWith(raw) && !(currentAnswer < 0 && raw === '-')) {
        answerEl.className = 'wrong';
        feedbackEl.textContent = '✗ Weiter versuchen';
        feedbackEl.className = 'wrong';
        setTimeout(() => {
          if (answerEl.className === 'wrong') answerEl.className = '';
          if (feedbackEl.className === 'wrong') {
            feedbackEl.textContent = '';
            feedbackEl.className = '';
          }
        }, 600);
      }
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    answerEl.blur();
    gameScreen.style.display     = 'none';
    gameoverScreen.style.display = 'block';
    finalScore.textContent = score;
  }
</script>
</body>
</html>

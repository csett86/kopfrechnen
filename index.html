<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopfrechnen – Rechnen gegen die Zeit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      text-align: center;
      width: 360px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      color: #e94560;
    }

    h1 span { color: #eee; }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
    }

    #intro-text {
      white-space: pre-line;
    }

    /* ── Start screen ── */
    #start-screen button {
      margin-top: 1rem;
    }

    /* ── Game screen ── */
    #game-screen { display: none; }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .score-box, .timer-box, .level-box {
      background: #16213e;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      min-width: 100px;
    }

    .level-box .value { color: #f9ca24; font-size: 1rem; font-weight: 700; padding-top: 0.25rem; }

    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .score-box .value { color: #0f3460; color: #e94560; }

    .timer-box .value { color: #53d8fb; }
    .timer-box.urgent .value { color: #ff6b6b; animation: pulse 0.5s infinite alternate; }

    @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

    /* progress bar */
    .timer-bar-wrap {
      height: 6px;
      background: #16213e;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    #timer-bar {
      height: 100%;
      background: #53d8fb;
      width: 100%;
      transition: width 0.1s linear, background-color 0.3s;
      border-radius: 3px;
    }

    #timer-bar.urgent { background: #ff6b6b; }

    /* problem */
    .problem {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
      min-height: 4.5rem;
    }

    /* answer input */
    #answer {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1.6rem;
      text-align: center;
      border: 2px solid #0f3460;
      border-radius: 12px;
      background: #16213e;
      color: #eee;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .answer-input-wrap {
      position: relative;
    }

    #answer::placeholder {
      color: transparent;
    }

    .answer-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(calc(-50% + 0.3em), -50%);
      font-size: 1.6rem;
      color: rgba(238, 238, 238, 0.65);
      pointer-events: none;
      user-select: none;
    }

    #answer:not(:placeholder-shown) + .answer-placeholder {
      display: none;
    }

    #answer:focus { border-color: #53d8fb; }
    #answer.correct { border-color: #4ecca3; background: #1a3a30; }
    #answer.wrong   { border-color: #e94560; background: #3a1a1e; animation: shake 0.3s; }

    @media (pointer: fine) {
      #answer::-webkit-outer-spin-button,
      #answer::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      #answer[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      50%  { transform: translateX(6px); }
      75%  { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    /* feedback */
    #feedback {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      min-height: 1.2rem;
      color: #4ecca3;
    }

    #feedback.wrong { color: #e94560; }

    /* ── Game over screen ── */
    #gameover-screen { display: none; }

    .gameover-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 0.5rem;
    }

    .final-score {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .final-score #final-score {
      color: #eee;
      font-size: 3rem;
      font-weight: 700;
      display: block;
      margin: 0.3rem 0;
    }

    /* shared button */
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #c73652; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div id="app">

  <!-- Start screen -->
  <div id="start-screen">
    <h1 id="app-title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <p id="intro-text"></p>
    <button id="start-btn"></button>
  </div>

  <!-- Game screen -->
  <div id="game-screen">
    <div class="hud">
      <div class="score-box">
          <div class="label" id="score-label"></div>
        <div class="value" id="score">0</div>
      </div>
      <div class="level-box">
        <div class="label" id="level-label"></div>
        <div class="value" id="level-display"></div>
      </div>
      <div class="timer-box" id="timer-box">
          <div class="label" id="time-label"></div>
        <div class="value" id="timer">7</div>
      </div>
    </div>

    <div class="timer-bar-wrap">
      <div id="timer-bar"></div>
    </div>

    <div class="problem" id="problem"></div>

    <div class="answer-input-wrap">
      <input
        id="answer"
        type="number"
        inputmode="numeric"
        autocomplete="off"
        placeholder=" "
      />
      <span class="answer-placeholder" aria-hidden="true">?</span>
    </div>

    <div id="feedback"></div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen">
    <div class="gameover-title" id="result-title"></div>
    <div class="final-score">
      <span id="final-score">0</span>
      <span id="points-label"></span>
    </div>
    <button id="restart-btn"></button>
  </div>

</div>

<script>
  const INITIAL_TIME = 7;
  const I18N = {
    de: {
      page_title: 'Kopfrechnen – Rechnen gegen die Zeit',
      app_title: 'Kopfrechnen',
      subtitle: 'Kopfrechnen — gegen die Uhr!',
      intro_text: 'Löse so viele Aufgaben wie möglich.\nDie Aufgaben werden mit der Zeit schwerer.\nDu hast 7 Sekunden pro Aufgabe.\nJede richtige Antwort gibt 1 Punkt.',
      start_button: 'Spiel starten',
      score_label: 'Punkte',
      level_label: 'Level',
      time_label: 'Zeit',
      result_title: 'Ergebnis',
      points_label: 'Punkte',
      restart_button: 'Nochmal spielen',
      feedback_correct: '✓ Richtig!',
      feedback_wrong: '✗ Weiter versuchen',
      feedback_level_up: '⭐ Level: {level}!',
      level_easy: 'Einfach',
      level_light: 'Leicht',
      level_medium: 'Mittel',
      level_hard: 'Schwer',
      level_expert: 'Experte',
    },
    en: {
      page_title: 'Mental Math – Race Against Time',
      app_title: 'Mental Math',
      subtitle: 'Mental Math — beat the clock!',
      intro_text: 'Solve as many problems as possible.\nThe problems get harder over time.\nYou have 7 seconds per problem.\nEach correct answer gives 1 point.',
      start_button: 'Start game',
      score_label: 'Score',
      level_label: 'Level',
      time_label: 'Time',
      result_title: 'Result',
      points_label: 'Points',
      restart_button: 'Play again',
      feedback_correct: '✓ Correct!',
      feedback_wrong: '✗ Keep trying',
      feedback_level_up: '⭐ Level: {level}!',
      level_easy: 'Easy',
      level_light: 'Light',
      level_medium: 'Medium',
      level_hard: 'Hard',
      level_expert: 'Expert',
    },
    nl: {
      page_title: 'Hoofdrekenen – Rekenen tegen de tijd',
      app_title: 'Hoofdrekenen',
      subtitle: 'Hoofdrekenen — tegen de klok!',
      intro_text: 'Los zo veel mogelijk opgaven op.\nDe opgaven worden na verloop van tijd moeilijker.\nJe hebt 7 seconden per opgave.\nElk goed antwoord geeft 1 punt.',
      start_button: 'Start spel',
      score_label: 'Punten',
      level_label: 'Niveau',
      time_label: 'Tijd',
      result_title: 'Resultaat',
      points_label: 'Punten',
      restart_button: 'Opnieuw spelen',
      feedback_correct: '✓ Correct!',
      feedback_wrong: '✗ Blijf proberen',
      feedback_level_up: '⭐ Niveau: {level}!',
      level_easy: 'Makkelijk',
      level_light: 'Licht',
      level_medium: 'Gemiddeld',
      level_hard: 'Moeilijk',
      level_expert: 'Expert',
    },
  };
  let currentLang = detectInitialLanguage();

  // ── Difficulty levels ───────────────────────────────────────────
  // Each level defines which operations are available, the max operand for
  // addition/subtraction, the max factor for multiplication, and the max
  // divisor/quotient for division.
  const LEVELS = [
    { threshold:  0, nameKey: 'level_easy',   ops: ['+'],                  addMax: 10, mulMax: 0,  divMax: 0  },
    { threshold:  4, nameKey: 'level_light',  ops: ['+', '−'],             addMax: 20, mulMax: 0,  divMax: 0  },
    { threshold:  9, nameKey: 'level_medium', ops: ['+', '−', '×'],        addMax: 50, mulMax: 6,  divMax: 0  },
    { threshold: 18, nameKey: 'level_hard',   ops: ['+', '−', '×', '÷'],   addMax: 99, mulMax: 9,  divMax: 5  },
    { threshold: 30, nameKey: 'level_expert', ops: ['+', '−', '×', '÷'],   addMax: 150, mulMax: 12, divMax: 9 },
  ];

  function getDifficultyLevel(s) {
    let lvl = LEVELS[0];
    for (const l of LEVELS) {
      if (s >= l.threshold) lvl = l;
      else break;
    }
    return lvl;
  }

  const startScreen    = document.getElementById('start-screen');
  const gameScreen     = document.getElementById('game-screen');
  const gameoverScreen = document.getElementById('gameover-screen');

  const scoreEl       = document.getElementById('score');
  const timerEl       = document.getElementById('timer');
  const timerBox      = document.getElementById('timer-box');
  const timerBar      = document.getElementById('timer-bar');
  const problemEl     = document.getElementById('problem');
  const answerEl      = document.getElementById('answer');
  const feedbackEl    = document.getElementById('feedback');
  const finalScore    = document.getElementById('final-score');
  const levelDisplay  = document.getElementById('level-display');

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);
  answerEl.addEventListener('input', onAnswerInput);

  let score = 0;
  let currentAnswer = null;
  let timerInterval = null;
  let timeLeft = INITIAL_TIME;
  let startTime = null;   // timestamp when current question started
  let currentLevelKey = LEVELS[0].nameKey;

  function detectInitialLanguage() {
    const browserLangs = [...(navigator.languages || []), navigator.language].filter(Boolean);
    for (const lang of browserLangs) {
      if (typeof lang !== 'string') continue;
      const short = lang.toLowerCase().slice(0, 2);
      if (I18N[short]) return short;
    }
    return 'de';
  }

  function translate(key) {
    return I18N[currentLang]?.[key] ?? key;
  }

  function formatMessage(template, params = {}) {
    return template.replace(/\{(\w+)\}/g, (_, key) => params[key] ?? '');
  }

  function applyTranslations() {
    document.documentElement.lang = currentLang;
    document.title = translate('page_title');
    document.getElementById('app-title').textContent = translate('app_title');
    document.getElementById('subtitle').textContent = translate('subtitle');
    document.getElementById('intro-text').textContent = translate('intro_text');
    document.getElementById('start-btn').textContent = translate('start_button');
    document.getElementById('score-label').textContent = translate('score_label');
    document.getElementById('level-label').textContent = translate('level_label');
    document.getElementById('time-label').textContent = translate('time_label');
    document.getElementById('result-title').textContent = translate('result_title');
    document.getElementById('points-label').textContent = translate('points_label');
    document.getElementById('restart-btn').textContent = translate('restart_button');
    levelDisplay.textContent = translate(currentLevelKey);
  }

  applyTranslations();

  // ── Problem generation ──────────────────────────────────────────
  function generateProblem() {
    const lvl = getDifficultyLevel(score);
    const op  = lvl.ops[Math.floor(Math.random() * lvl.ops.length)];
    let a, b, answer;

    if (op === '+') {
      a = rand(3, lvl.addMax);
      b = rand(3, lvl.addMax);
      answer = a + b;

    } else if (op === '−') {
      a = rand(3, lvl.addMax);
      b = rand(3, a);     // ensure positive result (avoids trivial n − 0)
      answer = a - b;

    } else if (op === '×') {
      a = rand(2, lvl.mulMax);
      b = rand(2, lvl.mulMax);
      answer = a * b;

    } else {              // ÷
      b = rand(2, lvl.divMax);       // divisor ≥ 2
      answer = rand(1, lvl.mulMax);  // quotient scales with multiplication range
      a = b * answer;                // dividend — guaranteed integer result
    }

    return { text: `${a} ${op} ${b}`, answer };
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ── Timer ───────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = INITIAL_TIME;
    startTime = performance.now();
    renderTimer(INITIAL_TIME);

    timerInterval = setInterval(() => {
      const elapsed = (performance.now() - startTime) / 1000;
      timeLeft = Math.max(0, INITIAL_TIME - elapsed);
      renderTimer(timeLeft);

      if (timeLeft === 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 100);
  }

  function renderTimer(t) {
    const secs = Math.ceil(t);
    timerEl.textContent = secs;
    const pct = (t / INITIAL_TIME) * 100;
    timerBar.style.width = pct + '%';

    const urgent = t <= 3;
    timerBox.classList.toggle('urgent', urgent);
    timerBar.classList.toggle('urgent', urgent);
  }

  // ── Game flow ───────────────────────────────────────────────────
  function startGame() {
    score = 0;
    currentLevelKey = LEVELS[0].nameKey;
    scoreEl.textContent = '0';
    levelDisplay.textContent = translate(currentLevelKey);
    feedbackEl.textContent = '';
    feedbackEl.className = '';

    startScreen.style.display    = 'none';
    gameoverScreen.style.display = 'none';
    gameScreen.style.display     = 'block';

    nextQuestion();
  }

  function nextQuestion() {
    const problem = generateProblem();
    currentAnswer = problem.answer;
    problemEl.textContent = problem.text + ' =';

    answerEl.value = '';
    answerEl.className = '';
    answerEl.focus();

    feedbackEl.textContent = '';
    feedbackEl.className = '';

    startTimer();
  }

  function onAnswerInput() {
    const raw = answerEl.value.trim();
    if (raw === '' || raw === '-') return;

    const entered = parseInt(raw, 10);
    if (isNaN(entered)) return;

    if (entered === currentAnswer) {
      clearInterval(timerInterval);
      score += 1;
      scoreEl.textContent = score;

      // Check for level-up
      const newLevelKey = getDifficultyLevel(score).nameKey;
      const leveledUp = newLevelKey !== currentLevelKey;
      currentLevelKey = newLevelKey;
      levelDisplay.textContent = translate(currentLevelKey);

      answerEl.className = 'correct';
      if (leveledUp) {
        feedbackEl.textContent = formatMessage(translate('feedback_level_up'), { level: translate(currentLevelKey) });
        feedbackEl.className = '';
      } else {
        feedbackEl.textContent = translate('feedback_correct');
        feedbackEl.className = '';
      }

      setTimeout(nextQuestion, leveledUp ? 700 : 400);
    } else {
      // Only shake when a full plausible answer has been typed.
      // We check by seeing if the answer could still be correct if more
      // digits are typed (simple heuristic: typed string is a prefix of
      // the correct answer string).
      const correctStr = String(currentAnswer);
      if (!correctStr.startsWith(raw) && !(currentAnswer < 0 && raw === '-')) {
        answerEl.className = 'wrong';
        feedbackEl.textContent = translate('feedback_wrong');
        feedbackEl.className = 'wrong';
        setTimeout(() => {
          if (answerEl.className === 'wrong') answerEl.className = '';
          if (feedbackEl.className === 'wrong') {
            feedbackEl.textContent = '';
            feedbackEl.className = '';
          }
        }, 600);
      }
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    answerEl.blur();
    gameScreen.style.display     = 'none';
    gameoverScreen.style.display = 'block';
    finalScore.textContent = score;
  }
</script>
</body>
</html>
